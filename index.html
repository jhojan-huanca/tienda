<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Descuentos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Sistema de Ventas</h1>
        
        <div class="input-group">
            <label>Precio del Producto:</label>
            <input type="number" id="precio" placeholder="Ej: 1500">
            
            <label>Cantidad:</label>
            <input type="number" id="cantidad" placeholder="Ej: 2">
            
            <button onclick="calcularDescuento()">Calcular Total</button>
        </div>

        <div class="boleta">
            <p>Subtotal: S/ <span id="subtotal">0.00</span></p>
            <p>Descuento (15%): S/ <span id="montoDescuento">0.00</span></p>
            <hr>
            <p class="total">Total a Pagar: S/ <span id="montoFinal">0.00</span></p>
        </div>
    </div>

    <script>
        function calcularDescuento() {
            // Obtenemos valores y convertimos a número
            const precio = Number(document.getElementById('precio').value);
            const cantidad = Number(document.getElementById('cantidad').value);

            // Lógica de cálculo
            const subtotal = precio * cantidad;
            const descuento = subtotal * 0.15; // 15% es igual a multiplicar por 0.15
            const totalFinal = subtotal - descuento;

            // Mostrar resultados con 2 decimales (.toFixed(2))
            document.getElementById('subtotal').textContent = subtotal.toFixed(2);
            document.getElementById('montoDescuento').textContent = descuento.toFixed(2);
            document.getElementById('montoFinal').textContent = totalFinal.toFixed(2);
        }
    </script>
</body>
</html>
